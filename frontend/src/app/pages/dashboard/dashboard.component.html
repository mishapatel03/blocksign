<div class="space-y-6">
  <!-- Header -->
  <div>
    <h1 class="text-2xl font-bold text-text-main">Dashboard</h1>
    <p class="text-text-muted">Welcome back, Misha 👋</p>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-4 gap-4">
    <div *ngFor="let stat of stats" 
         class="bg-surface rounded-xl border border-border p-5 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <div class="flex items-start justify-between">
        <div class="text-3xl mb-3">{{ stat.icon }}</div>
        <span class="text-xs text-text-muted bg-white/5 px-2 py-1 rounded-full">{{ stat.change }}</span>
      </div>
      <div class="text-2xl font-bold text-text-main mb-1">{{ stat.value }}</div>
      <div class="text-sm text-text-muted">{{ stat.label }}</div>
    </div>
  </div>

  <!-- Two Column Layout -->
  <div class="grid grid-cols-3 gap-6">
    <!-- Recent Documents (60%) -->
    <div class="col-span-2 bg-surface rounded-xl border border-border p-6 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <h2 class="text-lg font-semibold text-text-main mb-4">Recent Documents</h2>
      <div class="space-y-3">
        <div *ngFor="let doc of recentDocuments" 
             class="flex items-center justify-between p-3 bg-background rounded-lg border border-border hover:border-primary/50 transition-colors">
          <div class="flex items-center space-x-3">
            <span class="text-red-500">📄</span>
            <div>
              <p class="font-medium text-text-main">{{ doc.name }}</p>
              <p class="text-xs text-text-muted">{{ doc.date }}</p>
            </div>
          </div>
          <div class="flex items-center space-x-3">
            <span [class]="getStatusBadgeClass(doc.status)" 
                  class="px-3 py-1 rounded-full text-xs font-medium">
              {{ doc.status }}
            </span>
            <button class="text-primary hover:text-primary-dim text-sm font-medium transition-colors">
              View
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Signing Activity (40%) -->
    <div class="bg-surface rounded-xl border border-border p-6 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <h2 class="text-lg font-semibold text-text-main mb-4">Signing Activity</h2>
      <div class="space-y-4">
        <div *ngFor="let activity of signingActivity" 
             class="flex items-start space-x-3">
          <div [class]="activity.color" 
               class="w-3 h-3 rounded-full mt-1.5 flex-shrink-0"></div>
          <div>
            <p class="text-sm text-text-main">{{ activity.action }}</p>
            <p class="text-xs text-text-muted">{{ activity.time }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
