server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/auth/**
        - id: document-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/documents/**
        - id: signing-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/sign/**
        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notifications/**
        - id: blockchain-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/blockchain/**
        - id: audit-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/audit/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "https://blocksign-xyz.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
