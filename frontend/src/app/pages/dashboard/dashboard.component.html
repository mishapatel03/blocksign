<div class="page-enter space-y-6">
  <!-- Header -->
  <div>
    <h1 class="text-2xl font-bold text-text-main">Dashboard</h1>
    <p class="text-text-muted">Welcome back, Misha 👋</p>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-4 gap-4">
    <div *ngFor="let stat of stats" 
         (click)="navigateTo(stat.route)"
         class="bg-surface rounded-xl border border-border p-5 cursor-pointer hover:border-primary/50 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <div class="flex items-start justify-between">
        <div [class]="stat.colorClass" class="w-10 h-10 rounded-lg flex items-center justify-center">
          <lucide-angular [img]="getIcon(stat.iconName)" class="w-5 h-5"></lucide-angular>
        </div>
        <span class="text-xs text-text-muted bg-white/5 px-2 py-1 rounded-full">{{ stat.change }}</span>
      </div>
      <div class="text-2xl font-bold text-text-main mb-1">{{ stat.value }}</div>
      <div class="text-sm text-text-muted">{{ stat.label }}</div>
    </div>
  </div>

  <!-- Two Column Layout -->
  <div class="grid grid-cols-3 gap-6">
    <!-- Recent Documents (60%) -->
    <div class="col-span-2 bg-surface rounded-xl border border-border p-6 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <h2 class="text-lg font-semibold text-text-main mb-4">Recent Documents</h2>
      <div *ngIf="recentDocuments.length > 0" class="space-y-3">
        <div *ngFor="let doc of recentDocuments" 
             class="flex items-center justify-between p-3 bg-background rounded-lg border border-border hover:border-primary/50 transition-colors">
          <div class="flex items-center space-x-3">
            <lucide-angular [img]="FileText" class="w-5 h-5 text-text-muted"></lucide-angular>
            <div>
              <p class="font-medium text-text-main">{{ doc.name }}</p>
              <p class="text-xs text-text-muted">{{ doc.date }}</p>
            </div>
          </div>
          <div class="flex items-center space-x-3">
            <span [class]="getStatusBadgeClass(doc.status)" 
                  class="px-3 py-1 rounded-full text-xs font-medium">
              {{ doc.status }}
            </span>
            <button class="text-xs border border-border text-text-muted hover:border-primary hover:text-primary px-3 py-1 rounded-lg transition-colors duration-200">
              View
            </button>
          </div>
        </div>
      </div>
      <div *ngIf="recentDocuments.length === 0" 
           class="flex flex-col items-center justify-center py-12 text-center">
        <lucide-angular [img]="FileText" class="w-12 h-12 text-text-muted mb-3"></lucide-angular>
        <p class="text-text-muted text-sm">No documents yet</p>
        <button (click)="navigateTo(['/documents/upload'])"
          class="mt-3 text-primary text-sm hover:underline transition-colors">
          Upload your first document →
        </button>
      </div>
    </div>

    <!-- Signing Activity (40%) -->
    <div class="bg-surface rounded-xl border border-border p-6 hover:shadow-lg hover:shadow-primary/5 transition-all duration-200">
      <h2 class="text-lg font-semibold text-text-main mb-4">Signing Activity</h2>
      <div class="space-y-4">
        <div *ngFor="let activity of signingActivity" 
             class="flex items-start gap-3 py-3 border-b border-border last:border-0">
          <div [class]="getActivityDotColor(activity.status)" 
               class="w-2 h-2 rounded-full mt-2 flex-shrink-0"></div>
          <div class="flex-1">
            <p class="text-sm text-text-main">{{ activity.action }}</p>
            <p class="text-xs text-text-muted mt-0.5">{{ activity.time }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
