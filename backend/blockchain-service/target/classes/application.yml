server:
  port: 8084

spring:
  application:
    name: blockchain-service
  datasource:
    url: jdbc:postgresql://localhost:5432/blocksign_blockchain
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

blockchain:
  infura:
    url: ${INFURA_URL:https://sepolia.infura.io/v3/YOUR_KEY}
  private-key: ${BLOCKCHAIN_PRIVATE_KEY:mock-key}
  network: sepolia
