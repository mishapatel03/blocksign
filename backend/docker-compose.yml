services:
  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: blocksign-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: blocksign-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Config Server
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: blocksign-config-server
    ports:
      - "8888:8888"
    environment:
      PORT: 8888
      SPRING_PROFILES_ACTIVE: native
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: blocksign-auth-service
    ports:
      - "8086:8086"
    environment:
      PORT: 8086
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d997fncs728c73crljn0-a.oregon-postgres.render.com:5432/blocksign_docs?sslmode=require
      SPRING_DATASOURCE_USERNAME: blocksign_user
      SPRING_DATASOURCE_PASSWORD: 7KTbsnTKchrW2KcNoKGnFqg8d6Pj1kEn
      JWT_SECRET: mock-secret-key-for-development-only
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: blocksign-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Document Service
  document-service:
    build:
      context: ./document-service
      dockerfile: Dockerfile
    container_name: blocksign-document-service
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 8081
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d997fncs728c73crljn0-a.oregon-postgres.render.com:5432/blocksign_docs?sslmode=require
      SPRING_DATASOURCE_USERNAME: blocksign_user
      SPRING_DATASOURCE_PASSWORD: 7KTbsnTKchrW2KcNoKGnFqg8d6Pj1kEn
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Signing Service
  signing-service:
    build:
      context: ./signing-service
      dockerfile: Dockerfile
    container_name: blocksign-signing-service
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 8082
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d997fncs728c73crljn0-a.oregon-postgres.render.com:5432/blocksign_docs?sslmode=require
      SPRING_DATASOURCE_USERNAME: blocksign_user
      SPRING_DATASOURCE_PASSWORD: 7KTbsnTKchrW2KcNoKGnFqg8d6Pj1kEn
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: blocksign-notification-service
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 8083
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_USERNAME: mock@gmail.com
      MAIL_PASSWORD: mockpassword
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Blockchain Service
  blockchain-service:
    build:
      context: ./blockchain-service
      dockerfile: Dockerfile
    container_name: blocksign-blockchain-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d997fncs728c73crljn0-a.oregon-postgres.render.com:5432/blocksign_docs?sslmode=require
      SPRING_DATASOURCE_USERNAME: blocksign_user
      SPRING_DATASOURCE_PASSWORD: 7KTbsnTKchrW2KcNoKGnFqg8d6Pj1kEn
      BLOCKCHAIN_INFURA_URL: https://sepolia.infura.io/v3/YOUR_KEY
      BLOCKCHAIN_PRIVATE_KEY: mock-key
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Audit Service
  audit-service:
    build:
      context: ./audit-service
      dockerfile: Dockerfile
    container_name: blocksign-audit-service
    ports:
      - "8085:8085"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT: 8085
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d997fncs728c73crljn0-a.oregon-postgres.render.com:5432/blocksign_docs?sslmode=require
      SPRING_DATASOURCE_USERNAME: blocksign_user
      SPRING_DATASOURCE_PASSWORD: 7KTbsnTKchrW2KcNoKGnFqg8d6Pj1kEn
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  default:
    name: blocksign-network