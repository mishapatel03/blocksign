<nav class="h-16 bg-surface border-b border-border flex items-center justify-between px-6">
  <div class="flex items-center space-x-4">
    <div>
      <h1 class="text-xl font-semibold text-text-main">{{ pageTitle }}</h1>
      <p class="text-xs text-text-muted">{{ breadcrumb }}</p>
    </div>
  </div>

  <div class="flex items-center space-x-4">
    <!-- Notification Bell -->
    <button class="relative p-2 text-text-muted hover:text-text-main transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
      </svg>
      <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
    </button>

    <!-- Wallet Connection -->
    <button
      (click)="toggleWallet()"
      class="flex items-center space-x-2 px-3 py-1.5 rounded-lg border border-primary text-primary hover:bg-primary/10 transition-all duration-200 text-sm"
    >
      <span>🦊</span>
      <span *ngIf="!walletConnected">Connect Wallet</span>
      <span *ngIf="walletConnected" class="flex items-center space-x-2">
        <span class="w-2 h-2 bg-success rounded-full"></span>
        <span>{{ walletAddress }}</span>
      </span>
    </button>
  </div>
</nav>
