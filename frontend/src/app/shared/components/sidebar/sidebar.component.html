<aside class="w-60 bg-surface border-r border-border flex flex-col h-screen">
  <div class="p-6 border-b border-border">
    <div class="flex items-center space-x-3">
      <span class="text-2xl">⬡</span>
      <div>
        <h1 class="text-lg font-bold text-primary">BlockSign</h1>
        <p class="text-xs text-text-muted">Powered by Ethereum</p>
      </div>
    </div>
  </div>

  <nav class="flex-1 py-4">
    <a routerLink="/dashboard" routerLinkActive="active" [ngClass]="router.isActive('/dashboard', false)
       ? 'bg-primary/10 text-primary border-primary'
       : 'text-text-muted border-transparent'"
      class="flex items-center space-x-3 px-6 py-3 hover:text-text-main hover:bg-white/5 transition-all duration-200 border-l-2">
      <lucide-angular [img]="LayoutDashboard" class="w-5 h-5"></lucide-angular>
      <span>Dashboard</span>
    </a>

    <a routerLink="/documents" routerLinkActive="active" [ngClass]="router.isActive('/documents', false)
       ? 'bg-primary/10 text-primary border-primary'
       : 'text-text-muted border-transparent'"
      class="flex items-center space-x-3 px-6 py-3 hover:text-text-main hover:bg-white/5 transition-all duration-200 border-l-2">
      <lucide-angular [img]="FileText" class="w-5 h-5"></lucide-angular>
      <span>Documents</span>
    </a>

    <a routerLink="/documents/upload" routerLinkActive="active" [ngClass]="router.isActive('/documents/upload', false)
       ? 'bg-primary/10 text-primary border-primary'
       : 'text-text-muted border-transparent'"
      class="flex items-center space-x-3 px-6 py-3 hover:text-text-main hover:bg-white/5 transition-all duration-200 border-l-2">
      <lucide-angular [img]="Upload" class="w-5 h-5"></lucide-angular>
      <span>Upload</span>
    </a>

    <a routerLink="/audit" routerLinkActive="active" [ngClass]="router.isActive('/audit', false)
       ? 'bg-primary/10 text-primary border-primary'
       : 'text-text-muted border-transparent'"
      class="flex items-center space-x-3 px-6 py-3 hover:text-text-main hover:bg-white/5 transition-all duration-200 border-l-2">
      <lucide-angular [img]="Shield" class="w-5 h-5"></lucide-angular>
      <span>Audit Trail</span>
    </a>

    <!-- TODO: Settings page coming soon -->
    <!-- <a routerLink="/settings" routerLinkActive="active" [ngClass]="router.isActive('/settings', false)
       ? 'bg-primary/10 text-primary border-primary'
       : 'text-text-muted border-transparent'"
      class="flex items-center space-x-3 px-6 py-3 hover:text-text-main hover:bg-white/5 transition-all duration-200 border-l-2">
      <lucide-angular [img]="Wallet" class="w-5 h-5"></lucide-angular>
      <span>Settings</span>
    </a> -->
  </nav>

  <div class="p-4 border-t border-border">
    <div class="flex items-center space-x-3 mb-3">
      <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm">
        {{ getUserInitials() }}
      </div>
      <div class="flex-1">
        <p class="text-sm font-medium text-text-main">{{ userName }}</p>
        <span class="inline-block text-xs px-2 py-0.5 rounded-full {{ getRoleBadgeClass() }}">
          {{ userRole }}
        </span>
      </div>
    </div>
    
    <div class="mb-3">
      <div *ngIf="walletConnected" class="flex items-center space-x-2">
        <div class="w-2 h-2 rounded-full bg-green-400"></div>
        <span class="text-xs font-mono text-text-muted">{{ getTruncatedAddress() }}</span>
      </div>
      <a *ngIf="!walletConnected" (click)="connectWallet()" 
         class="text-xs text-primary cursor-pointer hover:underline transition-colors">
        Connect Wallet
      </a>
    </div>
    
    <button (click)="logout()"
      class="w-full text-left px-3 py-2 text-sm text-danger hover:bg-danger/10 rounded-lg transition-colors">
      Logout
    </button>
  </div>
</aside>
